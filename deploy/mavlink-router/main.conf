#
# /etc/mavlink-router/main.conf — RYUGU ROV Telemetry Router
#
# Routes the Pixhawk MAVLink stream from USB serial (/dev/ttyACM0) in
# parallel to two UDP endpoints:
#
#   1. MAVROS companion process  →  127.0.0.1:14555
#   2. QGroundControl on GCS     →  192.168.1.100:14550
#
# All endpoints are bidirectional ("Normal") so that both MAVROS (mode
# changes, arming) and QGC (calibration commands, parameter writes) can
# send data back to the Pixhawk.
#
# Deploy with:
#   sudo mkdir -p /etc/mavlink-router
#   sudo cp deploy/mavlink-router/main.conf /etc/mavlink-router/main.conf
#

[General]
# Disable the built-in TCP server — we only need UDP + serial routing.
TcpServerPort=0
# Set to true to log per-link statistics; keep off in production.
ReportStats=false
# ArduSub uses the "common" MAVLink dialect (same as ArduPilot).
MavlinkDialect=common

# ── Pixhawk Serial Link ──────────────────────────────────────────────
[UartEndpoint serial-pixhawk]
Device = /dev/ttyACM0
Baud  = 115200
# FlowControl = off  # uncomment if your Pixhawk cable has only TX/RX/GND

# ── MAVROS on localhost ──────────────────────────────────────────────
[UdpEndpoint mavros]
Mode    = Normal
Address = 127.0.0.1
Port    = 14555

# ── QGroundControl on the GCS laptop ─────────────────────────────────
[UdpEndpoint qgc-gcs]
Mode    = Normal
Address = 192.168.1.100
Port    = 14550
